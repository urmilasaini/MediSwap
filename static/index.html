<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PharmaAI — Medicine Alternative Finder</title>
  <meta name="description" content="Find equivalent medicine alternatives by composition, brand, or natural language query." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────────────── -->
<nav class="navbar">
  <a class="nav-brand" href="/">
    <span class="logo-icon">⚕</span>
    <span class="logo-text">Pharma<span class="accent">AI</span></span>
  </a>
  <div class="nav-status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Connecting…</span>
  </div>
</nav>

<!-- ── Hero ──────────────────────────────────────────────────────────── -->
<section class="hero">
  <h1>Find Medicine <span class="gradient-text">Alternatives</span></h1>
  <p>Search by brand name, salt composition, or describe what you need in plain English</p>

  <div class="search-wrapper">
    <div class="search-box">
      <!-- search icon -->
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>

      <input
        id="searchInput"
        type="text"
        placeholder="Dolo 650 · Paracetamol · fever medicine for adults…"
        autocomplete="off"
        spellcheck="false"
      />
      <span class="search-kbd">⌘K</span>
    </div>

    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="fuzzy" id="modeSearch">
        🔍 Brand Search
      </button>
      <button class="mode-btn" data-mode="semantic" id="modeSemantic">
        ✨ AI Search
      </button>
    </div>
  </div>
</section>

<!-- ── Quick-search chips ─────────────────────────────────────────────── -->
<div class="quick-chips" id="quickChips">
  <span class="chip" data-q="Dolo 650">Dolo 650</span>
  <span class="chip" data-q="Paracetamol">Paracetamol</span>
  <span class="chip" data-q="Azithromycin">Azithromycin</span>
  <span class="chip" data-q="Metformin">Metformin</span>
  <span class="chip" data-q="Atorvastatin">Atorvastatin</span>
  <span class="chip" data-q="fever medicine" data-mode="semantic">fever medicine ✨</span>
  <span class="chip" data-q="antibiotic for cough" data-mode="semantic">antibiotic for cough ✨</span>
  <span class="chip" data-q="blood pressure tablet" data-mode="semantic">blood pressure ✨</span>
</div>

<!-- ── Main content ───────────────────────────────────────────────────── -->
<div class="main-content">

  <!-- Results Section -->
  <section id="resultsSection" class="hidden">
    <div class="results-meta">
      <span id="resultsMeta"></span>
    </div>
    <div class="results-grid" id="resultsGrid"></div>
  </section>

  <!-- Detail Section -->
  <section id="detailSection" class="hidden">
    <div class="detail-back" id="backBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back to results
    </div>

    <div class="detail-layout">
      <!-- Left: medicine info -->
      <div id="detailMain"></div>

      <!-- Right: alternatives + semantic -->
      <div id="detailSide"></div>
    </div>
  </section>

</div><!-- /.main-content -->

<script src="/js/main.js"></script>
</body>
</html>
